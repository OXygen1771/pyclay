name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Test pyclay (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.14" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: astral-sh/setup-uv
        uses: astral-sh/setup-uv@8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check

      - name: Ty check
        run: uv run ty check

      - name: Run tests
        run: uv run pytest --cov=pyclay --cov-report=term
